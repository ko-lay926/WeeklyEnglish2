<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📘 Weekly English</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>📘 English Grammar Quiz</h1>

<!-- NAME SCREEN -->
<div id="name-screen">

<h2>👤 Enter Your Name</h2>

<input type="text" id="studentName" placeholder="Your Name">

<button onclick="saveName()">🚀 Continue</button>

</div>

<!-- MAIN MENU -->
<div id="main-menu" class="hidden">

<button onclick="openWeekMenu()">🚀 Start Quiz</button>

<button onclick="showResults()">📊 My Results</button>

<button onclick="showAbout()">ℹ️ About</button>

<button onclick="updateQuizzes()">🔄 Update Weekly Quizzes</button>

</div>

<!-- WEEK MENU -->
<div id="week-menu" class="hidden">

<h2>📅 Select Week</h2>

<div id="weekButtons"></div>

<button onclick="goHome()">🏠 Back</button>

</div>

<!-- QUIZ AREA -->
<div id="quiz-box" class="hidden">

<p id="progress"></p>

<h2 id="question"></h2>

<div id="options"></div>

</div>

<!-- RESULT -->
<div id="result" class="hidden">

<h2>🎉 Your Score</h2>

<p id="scoreText"></p>

<button onclick="goHome()">🏠 Main Menu</button>

</div>

<!-- RESULT HISTORY -->
<div id="history" class="hidden">

<h2>📊 My Results</h2>

<div id="historyList"></div>

<button onclick="exportResults()">📤 Export Results</button>

<button onclick="goHome()">🏠 Main Menu</button>

</div>

<!-- ABOUT -->
<div id="about" class="hidden">

<h2>ℹ️ About This App</h2>

<p>
This app helps students practice basic English grammar offline.<br>
New quizzes will be added weekly.
</p>

<button onclick="goHome()">🏠 Main Menu</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
